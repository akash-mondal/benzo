# cargo-deny configuration for the Benzo workspace.
# Run locally with `cargo deny check` (cargo install cargo-deny).

[advisories]
# Fail on yanked crates; the advisory DB is checked for RUSTSEC entries.
yanked = "deny"
ignore = [
    # Unmaintained-only (NOT vulnerabilities), pulled transitively by the ark-*
    # and soroban-sdk ecosystems — nothing we can swap out. Real vulnerabilities
    # and yanks still fail the check.
    "RUSTSEC-2024-0388", # derivative — unmaintained (via ark-*)
    "RUSTSEC-2024-0436", # paste — unmaintained (via soroban / ark-*)
]

[licenses]
# Permissive licenses present in the dependency tree. Add deliberately.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception", # wasmparser (via soroban-env-host)
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
]
confidence-threshold = 0.9
# Don't warn about allowed licenses that happen not to appear in the tree.
unused-allowed-license = "allow"

[bans]
# Surface duplicate versions (lockfile bloat / drift) without failing.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
# The vendored zkhash Poseidon2 params and ark-* may resolve from git mirrors.
unknown-git = "allow"
