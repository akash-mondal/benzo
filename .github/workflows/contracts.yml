name: contracts

on:
  push:
    paths:
      - "contracts/**"
      - "circuits/poseidon_params/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/contracts.yml"
  pull_request:
    paths:
      - "contracts/**"
      - "circuits/poseidon_params/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rustup reads rust-toolchain.toml (channel + clippy/rustfmt + wasm target).
      - name: Show toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Build contract wasm
        run: |
          for d in verifier_groth16 merkle nullifier_set asp_membership \
                   asp_non_membership viewkey_anchor audit_root handle_registry pool; do
            echo "::group::$d"
            cargo build --manifest-path "contracts/$d/Cargo.toml" \
              --target wasm32v1-none --release
            echo "::endgroup::"
          done

  # Soroban static analysis (CoinFabrik Scout) — pairs with the Circomspect-clean
  # circuits for a statically-verified ZK stack. Scout's detector toolchain has
  # broken on GitHub runners before, so keep it visible but non-blocking; Rust
  # fmt/clippy/tests/wasm build above remain the hard gate.
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Install Scout
        id: install_scout
        continue-on-error: true
        run: cargo install cargo-scout-audit --locked
      - name: Scout (best effort)
        run: |
          if ! command -v cargo-scout-audit >/dev/null 2>&1; then
            echo "::warning::cargo-scout-audit could not be installed; skipping best-effort Scout analysis."
            exit 0
          fi

          cargo scout-audit --output-format md || {
            echo "::warning::Scout analysis failed; see logs above. Rust fmt/clippy/tests/wasm build remain the blocking contract gates."
            exit 0
          }
