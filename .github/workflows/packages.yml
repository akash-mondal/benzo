name: packages

on:
  push:
    paths:
      - "packages/**"
      - "apps/**"
      - "circuits/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/packages.yml"
  pull_request:
    paths:
      - "packages/**"
      - "apps/**"
      - "circuits/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm -r build
      # Poseidon2 constant-parity guard: the circom <-> TS <-> host hash must
      # never drift (a one-byte change would silently produce commitments the
      # chain can never match — a fund-loss class). Regenerate the params from
      # the committed circom source and fail if either the generated file or the
      # hand-synced @benzo/core copy has drifted. The circom-witness KAT lives in
      # circuits.test.ts and self-skips here where the circom artifacts are absent.
      - name: Poseidon2 parameter parity guard
        run: |
          node scripts/extract-poseidon-params.mjs
          git diff --exit-code -- circuits/poseidon_params/poseidon2_bn254.json
          cmp circuits/poseidon_params/poseidon2_bn254.json packages/core/src/crypto/poseidon2_bn254.json
      # Heavy snarkjs proving tests (circuits.test.ts) self-skip when the
      # gitignored .zkey/.wasm artifacts are absent; everything else — incl.
      # the committed VK/proof parity fixtures — runs and enforces invariants.
      - name: Test
        run: pnpm -r test
      # Honesty guard: no committed file may reference a dead pre-redeploy cluster
      # address (these once lurked in demo docs and sent reviewers to abandoned
      # contracts). The live IDs live only in deployments/testnet.json.
      - name: No stale-cluster addresses
        run: |
          if git grep -nE 'CCWBNQCJ|CAQZCOJU|CCSZAPFM' -- . ':!deployments/*.bak' ':!.github/workflows/packages.yml'; then
            echo "::error::a committed file references a dead pre-redeploy cluster address"; exit 1
          fi

  # Real ZK gate: fetches the exact published proving artifacts and runs the
  # snarkjs proving + on-chain-parity tests for real, so "green" actually means
  # proofs were generated and verified — not silently skipped. Opt-in: runs only
  # where the artifacts are reachable (BENZO_ARTIFACTS_BASE_URL secret set), so a
  # fork without the Release isn't a false red.
  zk-proofs:
    runs-on: ubuntu-latest
    if: ${{ vars.BENZO_ARTIFACTS_BASE_URL != '' || secrets.BENZO_ARTIFACTS_BASE_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Fetch proving artifacts (exact, sha256-verified against the manifest)
        env:
          BENZO_ARTIFACTS_BASE_URL: ${{ vars.BENZO_ARTIFACTS_BASE_URL || secrets.BENZO_ARTIFACTS_BASE_URL }}
        run: bash scripts/fetch-artifacts.sh
      - name: Real snarkjs proving + parity tests
        run: pnpm --filter @benzo/core test
