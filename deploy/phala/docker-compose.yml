# Benzo confidential prover/issuer enclave (Phala dstack / Intel TDX).
# Runs the REAL in-enclave Groth16 prover (services/prover-enclave): it generates
# proofs inside the TEE and serves TDX attestation quotes via the mounted dstack
# guest-agent socket, so a client attests the enclave (dcap-qvl) and seals the
# witness to the attested X25519 key BEFORE any witness is transmitted.
services:
  benzo-enclave:
    image: ghcr.io/akash-mondal/benzo-prover:v6
    ports:
      - "8080:8080" # HOST:CONTAINER -> https://<app-id>-8080.<node>.phala.network
    environment:
      # Real Google zkLogin (Phase 1) verification runs INSIDE the enclave.
      # This is a PUBLIC OAuth web client id (it ships in the frontend bundle; only
      # the client *secret* is sensitive, and we don't use it) — hardcoded so the
      # value can't be lost to Phala env-interpolation at `cvms upgrade`. The client
      # attests this enclave (dcap-qvl) before trusting any /auth/google verdict.
      - GOOGLE_CLIENT_ID=156696138-p7t6ahm4872mek5k2m2l2mp1duguggh2.apps.googleusercontent.com
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
    restart: unless-stopped
